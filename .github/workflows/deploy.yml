name: Deploy to GitHub Pages

# main 브랜치에 커밋되면 자동으로 빌드 후 배포한다.
on:
  push:
    branches: [main]
  workflow_dispatch:   # 저장소 Actions 탭에서 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

# 배포가 겹치면 마지막 것만 반영
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        working-directory: gym-app
        run: npm install

      - name: 빌드
        working-directory: gym-app
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: gym-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
